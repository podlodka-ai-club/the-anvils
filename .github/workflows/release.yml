name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/whilly-orchestrator/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-worker:
    name: Build whilly-worker distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build whilly-worker sdist and wheel
        working-directory: whilly_worker
        run: python -m build

      - name: Upload whilly-worker artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-worker
          path: whilly_worker/dist/

  publish-worker:
    name: Publish whilly-worker to PyPI
    needs: [publish, build-worker]
    runs-on: ubuntu-latest
    environment:
      name: pypi-worker
      url: https://pypi.org/project/whilly-worker/
    permissions:
      id-token: write
    steps:
      - name: Download whilly-worker artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-worker
          path: dist/

      - name: Publish whilly-worker to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
