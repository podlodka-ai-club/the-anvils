<table id="tasks"
       hx-get="/?fragment=tasks"
       hx-trigger="every 5s, sse:CLAIM, sse:START, sse:COMPLETE, sse:FAIL, sse:RELEASE, sse:SKIP"
       hx-swap="outerHTML"
       role="grid">
  <thead>
    <tr>
      <th scope="col">Task</th>
      <th scope="col">Plan</th>
      <th scope="col">Status</th>
      <th scope="col">Priority</th>
      <th scope="col">Claimed by</th>
      <th scope="col">Updated</th>
    </tr>
  </thead>
  <tbody>
    {% if tasks %}
      {% for t in tasks %}
        <tr id="task-{{ t.task_id }}"
            data-filter-text="{{ t.task_id }} {{ t.plan_id }} {{ t.status }} {{ t.priority }} {{ t.claimed_by or '' }}">
          <td><code>{{ t.task_id }}</code></td>
          <td>{{ t.plan_id }}</td>
          <td><span class="status status-{{ t.status|lower }}">{{ t.status }}</span></td>
          <td><span class="priority priority-{{ t.priority }}">{{ t.priority }}</span></td>
          <td>{{ t.claimed_by if t.claimed_by else "—" }}</td>
          <td><time datetime="{{ format_iso(t.updated_at) }}">{{ format_human(t.updated_at) }}</time></td>
        </tr>
      {% endfor %}
    {% else %}
      <tr id="tasks-empty">
        <td colspan="6"><em class="empty-state">No tasks in queue.</em></td>
      </tr>
    {% endif %}
  </tbody>
</table>
