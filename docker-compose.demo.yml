# Whilly Orchestrator — multi-container demo (для презентаций / самообучения).
#
# Цель: показать живьём v4-распределённую архитектуру —
#   Postgres ◄── control-plane (FastAPI) ◄── whilly-worker (HTTP)
# на одном хосте, тремя docker-сервисами.
#
# Логически это «БД + 2 application контейнера whilly»:
#   - postgres        — служебная БД (state machine + audit log)
#   - control-plane   — FastAPI / uvicorn, единственный знает про SQL
#   - worker          — отдельный процесс, как «второй VM», только httpx + whilly.core
#
# Команды:
#   docker compose -f docker-compose.demo.yml up --build
#   docker compose -f docker-compose.demo.yml exec control-plane whilly plan import examples/demo/tasks.json
#   docker compose -f docker-compose.demo.yml exec control-plane whilly plan show demo
#   docker compose -f docker-compose.demo.yml logs -f worker
#   docker compose -f docker-compose.demo.yml down -v
#
# ВАЖНО: для работы реальных задач worker'у нужен Claude CLI на PATH (или
# stub `tests/fixtures/fake_claude.sh`). По умолчанию контейнер worker
# использует stub из репозитория — этого достаточно, чтобы продемонстрировать
# state-machine переходы, audit-log и distributed-claim'ы без расхода токенов
# реального Claude. Чтобы подключить настоящий Claude — пробросьте бинарник
# через volume и переопределите `CLAUDE_BIN`.

services:
  # ─── 1. БД (state machine + append-only events log) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: whilly-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whilly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whilly}
      POSTGRES_DB: ${POSTGRES_DB:-whilly}
    ports:
      # Loopback only — даём psql-доступ для отладки прямо с хоста, но не
      # светим Postgres в LAN (одна из мин в docker-демо в open-офисах).
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - whilly_demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whilly} -d ${POSTGRES_DB:-whilly}"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  # ─── 2. Application контейнер #1: control-plane (FastAPI / uvicorn) ────────
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.demo
    # WHILLY_IMAGE_TAG_REF выставляется обёрткой workshop-demo.sh из
    # WHILLY_IMAGE_TAG: set → `mshegolev/whilly:${WHILLY_IMAGE_TAG}`,
    # unset → `whilly-demo:latest` (local-build path сохраняется
    # байт-в-байт). См. VAL-M1-COMPOSE-011.
    image: ${WHILLY_IMAGE_TAG_REF:-whilly-demo:latest}
    # Никогда не пытаться пулить из registry — образ собран локально
    # (см. шаг сборки в DEMO-CHECKLIST.md). Без этого compose на чистой
    # машине пытается `docker pull whilly-demo` и падает с
    # "pull access denied".
    pull_policy: never
    container_name: whilly-demo-control-plane
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WHILLY_DATABASE_URL: postgresql://${POSTGRES_USER:-whilly}:${POSTGRES_PASSWORD:-whilly}@postgres:5432/${POSTGRES_DB:-whilly}
      # Per-worker bearer (FR-1.2). В демо хардкодим — в проде это секрет, который
      # проходит через `whilly worker register`.
      WHILLY_WORKER_TOKEN: ${WHILLY_WORKER_TOKEN:-demo-bearer}
      # Cluster-join secret (тоже хардкод для демо).
      WHILLY_WORKER_BOOTSTRAP_TOKEN: ${WHILLY_WORKER_BOOTSTRAP_TOKEN:-demo-bootstrap}
      WHILLY_LOG_LEVEL: ${WHILLY_LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:${WHILLY_CONTROL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 10s
    command: ["control-plane"]
    # Volume mount к ./examples умышленно убран: на macOS+Colima
    # /opt/develop/... может не пробрасываться, и тогда examples
    # становятся пустыми внутри контейнера. Файлы уже COPY'нуты в
    # /opt/whilly/examples из Dockerfile.demo — этого достаточно для
    # `compose exec control-plane whilly plan import ...`.

  # ─── 3. Application контейнер #2: whilly-worker (HTTP-клиент) ──────────────
  #
  # Поддерживает `docker compose -f docker-compose.demo.yml up --scale worker=N`:
  # entrypoint.sh видит, что WHILLY_WORKER_TOKEN не задан, и регистрируется
  # через WHILLY_WORKER_BOOTSTRAP_TOKEN — каждая реплика получает свой
  # уникальный worker_id и per-worker bearer.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.demo
    image: ${WHILLY_IMAGE_TAG_REF:-whilly-demo:latest}
    pull_policy: never
    # `container_name` намеренно НЕ указан — иначе compose откажется делать
    # вторую реплику при `--scale worker=2` (имя контейнера должно быть
    # уникальным).
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      WHILLY_CONTROL_URL: http://control-plane:8000
      # plain HTTP к control-plane:8000 → connect-flow требует opt-in.
      # Connect-flow (WHILLY_USE_CONNECT_FLOW=1) — единственная ветка
      # entrypoint.sh, которая пробрасывает --insecure в `whilly worker connect`,
      # а та, в свою очередь, в exec'ed `whilly-worker`. Без обоих переменных
      # стартует строгий scheme-guard и worker'ы зацикливаются на ре-старте.
      WHILLY_USE_CONNECT_FLOW: "1"
      WHILLY_INSECURE: "1"
      # Bootstrap-токен — entrypoint.sh использует его для `whilly worker register`,
      # если WHILLY_WORKER_TOKEN не задан явно.
      WHILLY_WORKER_BOOTSTRAP_TOKEN: ${WHILLY_WORKER_BOOTSTRAP_TOKEN:-demo-bootstrap}
      WHILLY_PLAN_ID: ${WHILLY_PLAN_ID:-demo}
      # ─── Claude / LLM настройки ──────────────────────────────────────────
      # Worker зовёт CLAUDE_BIN (любой бинарь, который умеет
      # `--output-format json -p "<prompt>"` и выдаёт JSON envelope с
      # <promise>COMPLETE</promise>). По умолчанию используется stub
      # с задержкой 2.5s — параллельный claim видно глазом.
      #
      # Чтобы переключиться на реальный LLM, выставите CLAUDE_BIN на
      # universal shim и подсуньте credentials провайдера:
      #
      #   CLAUDE_BIN: /opt/whilly/docker/llm_shim.py
      #   LLM_PROVIDER: groq        # groq|openrouter|cerebras|gemini|ollama|claude
      #   LLM_BASE_URL: https://api.groq.com/openai/v1
      #   LLM_API_KEY:  ${GROQ_API_KEY}
      #   # LLM_MODEL не задавайте — entrypoint авто-подберёт модель под
      #   # cgroup-лимиты контейнера (см. docker/llm_resource_picker.py).
      #
      # workshop-demo.sh с флагом --llm <provider> делает это за вас.
      CLAUDE_BIN: ${CLAUDE_BIN:-/opt/whilly/tests/fixtures/fake_claude_demo.sh}
      FAKE_CLAUDE_DEMO_DELAY: "${FAKE_CLAUDE_DEMO_DELAY:-2.5}"
      # ─── Agentic CLI mode (--cli claude-code|opencode|gemini) ────────────
      # cli_adapter.py транслирует whilly's argv в native argv каждого CLI
      # и парсит native output. WHILLY_CLI выбирает adapter route.
      #
      # Since v4.4.2 (m1-opencode-big-pickle-default): the worker default
      # is `opencode` + `opencode/big-pickle` — the free, anonymous
      # stealth model on OpenCode Zen (no API key required as of
      # 2026-05-02). Zero-key onboarding: workshop-demo.sh works on a
      # fresh checkout without any provider credential. To opt into Groq
      # set WHILLY_MODEL=groq/openai/gpt-oss-120b AND provide GROQ_API_KEY
      # via the host env / `.env` (gitignored — never commit a real key);
      # the worker's groq-credentials guard then re-engages. Anthropic /
      # OpenAI escape hatches work the same way.
      WHILLY_CLI: ${WHILLY_CLI:-opencode}
      WHILLY_MODEL: ${WHILLY_MODEL:-opencode/big-pickle}
      WHILLY_FORCE_COMPLETE: ${WHILLY_FORCE_COMPLETE:-1}
      # Credentials для каждого agentic CLI (читаются нативно):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENCODE_DEFAULT_PROVIDER: ${OPENCODE_DEFAULT_PROVIDER:-}
      # ─── Raw LLM shim mode (--llm groq|openrouter|cerebras|...) ──────────
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIER_OVERRIDE: ${LLM_TIER_OVERRIDE:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-}
      LLM_X_TITLE: ${LLM_X_TITLE:-}
      LLM_FORCE_COMPLETE: ${LLM_FORCE_COMPLETE:-0}
      WHILLY_LOG_LEVEL: ${WHILLY_LOG_LEVEL:-INFO}
    command: ["worker"]

  # ─── 4. (Опционально) funnel sidecar — localhost.run reverse SSH tunnel ────
  #
  # Profile-gated за `--profile funnel` — дефолтный
  # `docker compose -f docker-compose.demo.yml up` обязан остаться
  # байт-в-байт как в v4.4 (mission §4 backcompat invariant).
  # Активируется явным `docker compose ... --profile funnel up -d`.
  #
  # Держит SSH reverse-tunnel к `nokey@localhost.run` (free anonymous
  # tier) и публикует ротирующийся `https://<random>.lhr.life` URL в
  # postgres-таблицу `funnel_url` + shared-volume `/funnel/url.txt`.
  # На disconnect — exponential backoff и переподключение. См.
  # `Dockerfile.funnel`, `scripts/funnel/run.sh`,
  # `docs/Deploy-M2.md` § Topology A.
  funnel:
    build:
      context: .
      dockerfile: Dockerfile.funnel
    image: whilly-funnel:latest
    pull_policy: never
    container_name: whilly-demo-funnel
    profiles: ["funnel"]
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      FUNNEL_LOCAL_HOST: control-plane
      FUNNEL_LOCAL_PORT: "8000"
      FUNNEL_SERVER_ALIVE_INTERVAL: "${FUNNEL_SERVER_ALIVE_INTERVAL:-60}"
      FUNNEL_RETRY_BACKOFF_SECONDS: "${FUNNEL_RETRY_BACKOFF_SECONDS:-5}"
      FUNNEL_URL_FILE: /funnel/url.txt
      # M3 (m3-funnel-stable-url-via-ssh-key): опционально включает
      # SSH-key stable URL и paid custom-domain режимы. По дефолту пусто
      # — поведение байт-в-байт совпадает с v4.5 anonymous-rotating.
      # См. docs/Distributed-Setup.md § "Stable URL via SSH key (M3)".
      FUNNEL_SSH_KEY_PATH: "${FUNNEL_SSH_KEY_PATH:-}"
      FUNNEL_CUSTOM_DOMAIN: "${FUNNEL_CUSTOM_DOMAIN:-}"
      WHILLY_DATABASE_URL: postgresql://${POSTGRES_USER:-whilly}:${POSTGRES_PASSWORD:-whilly}@postgres:5432/${POSTGRES_DB:-whilly}
    volumes:
      - funnel_url_volume:/funnel
    # Mission §4 cap: ~32 MB alpine + openssh-client image.
    mem_limit: 64m
    mem_reservation: 16m

  # ─── 5. (Опционально) одноразовый seed-runner ──────────────────────────────
  # Импортирует demo-план в БД сразу после старта control-plane. Поднимается
  # отдельным сервисом с `restart: 'no'` — в `docker compose up` он сделает
  # своё дело и завершится; повторный `up` не запустит его снова без
  # `--force-recreate`. Можно отключить с `--scale seed=0`.
  seed:
    image: ${WHILLY_IMAGE_TAG_REF:-whilly-demo:latest}
    pull_policy: never
    container_name: whilly-demo-seed
    profiles: ["seed"]
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      WHILLY_DATABASE_URL: postgresql://${POSTGRES_USER:-whilly}:${POSTGRES_PASSWORD:-whilly}@postgres:5432/${POSTGRES_DB:-whilly}
    # examples/ уже COPY'нуты в image (Dockerfile.demo), volume mount не нужен
    # и портит UX на macOS+Colima.
    command: ["whilly", "plan", "apply", "examples/demo/tasks.json"]
    restart: "no"

volumes:
  whilly_demo_pgdata:
    name: whilly_demo_pgdata
  # Shared volume between the funnel sidecar (writer) and any consumer
  # that prefers reading `/funnel/url.txt` over a postgres lookup. Only
  # populated when `--profile funnel` is active.
  funnel_url_volume:
    name: whilly_demo_funnel_url
