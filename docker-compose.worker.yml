# Whilly Orchestrator — worker-only stack (M1 split-host deployment).
#
# ADDITIVE: docker-compose.demo.yml (single-host workshop) is byte-for-byte
# unchanged. This file deploys a single `whilly-worker` against a
# control-plane that lives on a DIFFERENT host (typically a VPS running
# `docker-compose.control-plane.yml`). Pairs with the control-plane file for
# the cross-host demo path described in docs/Distributed-Setup.md.
#
# Topology:
#
#       +-------------------+              +---------------------+
#       |  Host A: VPS      |  HTTP(S)     |  Host B: laptop /   |
#       |  postgres + CP    |◄────────────►|  peer VM (this file)|
#       |  (control-plane)  |   register   |  whilly-worker      |
#       +-------------------+   long-poll  +---------------------+
#
# All connection params come from .env.worker (copy .env.worker.example to
# .env.worker and fill in the values). Compose auto-loads ".env" from the
# repo root; the template lives at .env.worker.example because each host
# has different secrets and we never want to commit them.
#
# Quick start (after copying .env.worker.example → .env.worker):
#   docker-compose -f docker-compose.worker.yml --env-file .env.worker up -d
#   docker logs whilly-worker     # look for "registered worker_id=w-XXXXXXXX"
#
# Local-build override (for development without pulling the published image):
#   WHILLY_IMAGE=whilly:dev docker-compose -f docker-compose.worker.yml \
#       --env-file .env.worker up -d
#
# Workspace volume (./workspace:/work) is declared as a PLACEHOLDER for the
# M4 plan-workspace work (per-worker git scratch + push-branch). At M1 the
# worker does not read or write to it; the directory is created so an
# operator can pre-stage data without re-running compose.
#
# Memory budget: worker capped at 256MB to mirror the control-plane / postgres
# caps from docker-compose.control-plane.yml. On the 964MB VPS profile the
# whole stack stays under 600MB even when the worker shares the host.
#
# See docs/Distributed-Setup.md for the multi-host walkthrough.

services:
  # ─── App: whilly-worker (HTTP-client). No DB, no API — pure pull-loop. ────
  worker:
    # Default to the published image (matches the current v4.6.1 release
    # artifact — must stay in lock-step with docker-compose.control-plane.yml
    # so a worker booted against a fresh control-plane never lags behind on
    # migration-aware client code). The production Dockerfile installs
    # `'.[server,worker]'`; the worker role never touches the server-only
    # paths at runtime, so this is the same image used by
    # docker-compose.control-plane.yml. Override with WHILLY_IMAGE=<tag>
    # for dev / local-build workflows.
    image: ${WHILLY_IMAGE:-mshegolev/whilly:4.6.1}
    # No `container_name:` here — Compose auto-generates names like
    # `whilly-orchestrator-worker-1`, `-worker-2`, ... so operators can run
    # `docker-compose -f docker-compose.worker.yml up -d --scale worker=N`
    # for multi-worker scenarios (VAL-M2-DEMO-902 / VAL-M2-LHR-003). A fixed
    # name would force Docker to refuse `--scale worker=N>1` (container
    # names must be unique). The worker entrypoint registers itself using
    # `$(hostname)` (see `hostname:` below), so the events table audit
    # identity stays meaningful regardless of the auto-generated container
    # name.
    # Container hostname propagated to `whilly worker register --hostname`
    # via the entrypoint's `$(hostname)` capture. Operators set this in
    # .env.worker so the events table shows a meaningful identity in the
    # multi-host audit log (e.g. "macbook-mvs", "vps-eu-1").
    hostname: ${WHILLY_WORKER_HOSTNAME:-whilly-worker}
    restart: unless-stopped
    environment:
      # Required at RUNTIME — must be supplied by the operator in
      # .env.worker (typically http://<vps-ip>:8000 or the rotating
      # https://<random>.lhr.life URL published by the M2 localhost.run
      # `funnel` sidecar). We deliberately use the
      # `:-` (default-if-unset) form rather than `:?` (required) here so
      # that a `docker-compose -f docker-compose.worker.yml config -q`
      # against a clean checkout (no env file, no exported vars) parses
      # cleanly — see VAL-M1-COMPOSE-003. The runtime fail-loud check
      # lives in docker/entrypoint.sh which runs `: "${WHILLY_CONTROL_URL:?...}"`
      # — that test fires on BOTH unset and empty values, so passing the
      # empty string through here still produces a clear, immediate
      # error message at `up -d` time. Do NOT change this back to `:?`
      # without breaking VAL-M1-COMPOSE-003.
      WHILLY_CONTROL_URL: "${WHILLY_CONTROL_URL:-}"
      # Cluster-join secret consumed by the entrypoint's `whilly worker
      # register` flow. Same rationale as WHILLY_CONTROL_URL above:
      # default to empty so `config -q` succeeds on a clean checkout, and
      # let docker/entrypoint.sh's `: "${WHILLY_WORKER_BOOTSTRAP_TOKEN:?...}"`
      # gate (legacy + connect-flow paths both have one) emit the
      # actionable error at `up -d` time. Keep it out of git in real
      # deployments; the bootstrap token is a shared cluster secret
      # minted by the control-plane operator.
      WHILLY_WORKER_BOOTSTRAP_TOKEN: "${WHILLY_WORKER_BOOTSTRAP_TOKEN:-}"
      # Plan id this worker should drain. The control-plane is
      # multi-tenant per plan; "demo" matches docker-compose.demo.yml's
      # default so the same plan files work across topologies.
      WHILLY_PLAN_ID: ${WHILLY_PLAN_ID:-demo}
      # ─── Claude / LLM настройки (mirrored from docker-compose.demo.yml) ──
      # Worker calls CLAUDE_BIN to execute tasks. Default keeps the
      # zero-cost fake stub so a plain `up -d` against the control-plane
      # demonstrates state-machine flow without burning real tokens.
      CLAUDE_BIN: ${CLAUDE_BIN:-/opt/whilly/tests/fixtures/fake_claude_demo.sh}
      FAKE_CLAUDE_DEMO_DELAY: "${FAKE_CLAUDE_DEMO_DELAY:-2.5}"
      # Agentic CLI mode (--cli claude-code|opencode|gemini|codex) routed
      # through cli_adapter.py. Leave empty for the legacy claude_cli.py
      # backend (the v3 path).
      WHILLY_CLI: ${WHILLY_CLI:-}
      WHILLY_FORCE_COMPLETE: ${WHILLY_FORCE_COMPLETE:-1}
      # Provider credentials (read natively by each agentic CLI).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENCODE_DEFAULT_PROVIDER: ${OPENCODE_DEFAULT_PROVIDER:-}
      # Raw LLM shim mode (--llm groq|openrouter|cerebras|...).
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIER_OVERRIDE: ${LLM_TIER_OVERRIDE:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-}
      LLM_X_TITLE: ${LLM_X_TITLE:-}
      LLM_FORCE_COMPLETE: ${LLM_FORCE_COMPLETE:-0}
      WHILLY_LOG_LEVEL: ${WHILLY_LOG_LEVEL:-INFO}
    volumes:
      # PLACEHOLDER for M4 (per-worker plan-workspace topology — see
      # docs/Workspace-Topology.md). At M1 this mount is declared but
      # unused: the worker never reads or writes /work. Reserving the
      # path now means an operator who pre-creates ./workspace today
      # will not have to re-run compose when M4 lands.
      - ./workspace:/work
    # Mission §4 cap: 256MB per service. Worker's footprint is dominated
    # by the agentic CLI subprocess (claude/gemini/opencode), not by the
    # whilly-worker python loop itself, so the cap is intentionally
    # generous compared to the long-poll process alone (~80MB RSS).
    mem_limit: 256m
    mem_reservation: 64m
    command: ["worker"]
